name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.edition }}
    runs-on: ${{ matrix.os }}
    env:
      BUNDLE_WITHOUT: "development"
      SAXONC_EDITION: ${{ matrix.edition }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        edition: [he, pe, ee]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.5"
          bundler-cache: true

      - name: Cache SaxonC downloads
        id: cache-saxonc
        uses: actions/cache@v4
        with:
          path: ~/.saxonc
          key: saxonc-libs-${{ runner.os }}-${{ matrix.edition }}-${{ hashFiles('lib/saxon/libs/version.rb') }}

      - name: Install dependencies
        run: bundle install --jobs 4

      - name: Build and install saxonc-libs-* from source
        run: |
          gem build saxonc-libs-${{ matrix.edition }}.gemspec
          gem install saxonc-libs-${{ matrix.edition }}-*.gem

      - name: Run unit tests
        run: bundle exec rake test
